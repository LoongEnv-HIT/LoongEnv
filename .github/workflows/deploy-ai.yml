name: DEPLOY_AI

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: Member repository to publish
        required: true
        default: LoongEnv-ZHU_YH
        type: choice
        options:
          - LoongEnv-ZHU_YH

permissions:
  actions: write
  contents: read

jobs:
  dispatch-member-publish:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_WORKFLOW: publish-pages.yml
      TARGET_REF: main
      WORKFLOW_TOKEN: ${{ secrets.ORG_ACTIONS_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dispatch member publish workflow
        run: bash .github/scripts/deploy_ai.sh
